name: Nightly data refresh

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 UTC = 1am EST / 10pm PST
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests beautifulsoup4 lxml tqdm \
                      scikit-learn joblib python-dateutil rapidfuzz kaggle

      - name: Pull latest ufcstats data
        run: |
          cd data-pipeline/scrapers/ufcstats
          git pull origin master || git pull origin main
          mkdir -p ../../raw/ufcstats
          cp *.csv ../../raw/ufcstats/

      - name: Pull fresh Kaggle datasets
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          cd data-pipeline/raw/kaggle
          kaggle datasets download -d mdabbert/ultimate-ufc-dataset --force
          for f in *.zip; do unzip -o -q "$f" -d "${f%.zip}/"; done
          rm -f *.zip

      - name: Run pipeline
        run: |
          python data-pipeline/pipelines/pipeline.py

      - name: Commit refreshed data + model
        run: |
          git config user.email "v3rsus-bot@users.noreply.github.com"
          git config user.name "v3rsus-bot"
          git add data-pipeline/raw data-pipeline/processed data-pipeline/features data/model_v2.pkl
          git diff --staged --quiet || git commit -m "nightly data refresh"
          git push
